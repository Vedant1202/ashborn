name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # pnpm 11 requires Node >= 22.13; the packages themselves target >= 20
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm format:check

      # Includes the golden-scorecard test: the published AUCs must not move
      # unintentionally, and the corpus must score identically on every run.
      - run: pnpm test

      # The benchmark must run end to end from a build, offline.
      - run: node packages/cli/dist/index.js bench
