name: Release

# Publishing runs here, not on a laptop, so every release carries an npm
# provenance attestation linking the package to this commit and build.
# `pnpm release` (locally) cuts the version, changelog, tag, and GitHub release;
# pushing the `v*` tag triggers this workflow to build, test, and publish.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # pnpm rewrites workspace:* to real versions; --provenance attaches the
      # signed attestation. Needs an NPM_TOKEN secret with publish rights to the
      # @ashborn-sec scope. (To go fully tokenless, configure a trusted publisher
      # for each package on npmjs.com and drop NODE_AUTH_TOKEN.)
      - run: pnpm -r publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
